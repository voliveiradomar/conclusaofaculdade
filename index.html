<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contagem da Formatura</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #c9a84c;
      --accent2: #e8c96d;
      --text: #f0ece0;
      --muted: #6b6b7a;
      --progress-bg: #1a1a26;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
    }

    .container {
      width: min(680px, 92vw);
      position: relative;
      z-index: 1;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      color: var(--text);
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--accent), var(--border), transparent);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.35s;
    }

    .countdown-hero {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.4s;
    }

    .days-number {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 60%, #a07830 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.2));
    }

    .days-label {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
    }

    .days-desc {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.8rem 2rem;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
      position: relative;
      overflow: hidden;
    }

    .progress-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .progress-title {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-pct {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--progress-bg);
      overflow: hidden;
      margin-bottom: 0.8rem;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      width: 0%;
      transition: width 1.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 20px;
      background: linear-gradient(90deg, transparent, rgba(232,201,109,0.6));
    }

    .progress-dates {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    .stat {
      background: var(--surface);
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }

    .footer {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    .footer span { color: var(--accent); opacity: 0.7; }

    .corner {
      position: fixed;
      width: 120px;
      height: 120px;
      opacity: 0.15;
    }
    .corner-tl { top: 2rem; left: 2rem; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
    .corner-br { bottom: 2rem; right: 2rem; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .stat:last-child { grid-column: span 2; }
      .progress-section { padding: 1.4rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <p class="label">Ciências Contábeis</p>
    <h1>Contagem para a<br/><span>Formatura</span></h1>
    <p class="subtitle" id="dataFormatura">—</p>

    <div class="divider"></div>

    <div class="countdown-hero">
      <span class="days-number" id="diasRestantes">—</span>
      <span class="days-label">dias</span>
    </div>
    <p class="days-desc">restantes até a formatura</p>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Conclusão do Curso</span>
        <span class="progress-pct" id="pctTexto">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <div class="progress-dates">
        <span>09 fev 2025</span>
        <span>12 dez 2025</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">Dias cursados</span>
        <span class="stat-value accent" id="diasCursados">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total de dias</span>
        <span class="stat-value" id="diasTotal">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Semanas restantes</span>
        <span class="stat-value" id="semanasRestantes">—</span>
      </div>
    </div>

    <p class="footer">Elaborado por <span>Vítor do Mar</span> &nbsp;·&nbsp; <span id="hoje">—</span></p>
  </div>

  <script src="dates.js"></script>
</body>
</html>
